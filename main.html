<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCode</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #2c006d, #9b1acc, #e02fb5);
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ===== الهيدر ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background-color: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  position: relative;
}

header h1 {
  color: white;
  font-size: 24px;
  margin: 0;
  font-weight: bold;
}

.icon {
  width: 28px;
  height: 28px;
  border-radius: 4px;
  background-color: rgba(255,255,255,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-size: 18px;
  color: #333;
}

/* ===== البحث ===== */
.search-box {
  position: absolute;
  top: 70px;
  right: 20px;
  width: 220px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  display: none;
  z-index: 20;
}

.search-box.show {
  display: block;
}

/* ===== السايدبار ===== */
.sidebar {
  position: fixed;
  top: 60px;
  left: -100%;
  width: 250px;
  height: calc(100% - 60px);
  background-color: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  color: white;
  padding: 20px;
  transition: left 0.3s ease;
}

.sidebar.active {
  left: 0;
}

.sidebar h2 {
  cursor: pointer;
  user-select: none;
}

.sidebar ul {
  list-style: none;
  padding-left: 15px;
  margin: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.sidebar ul.show {
  max-height: 500px;
}

.sidebar ul li {
  margin: 10px 0;
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
}

.sidebar ul li:hover {
  background: rgba(255,255,255,0.15);
}

/* ===== المحتوى ===== */
.content {
  flex: 1;
  color: white;
  padding: 20px;
}

.game-title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* ===== كرت الكود ===== */
.code-card {
  background: linear-gradient(90deg,#ff4ecd,#ff7a7a);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
}

.code-label {
  color: white;
  font-weight: bold;
  margin-bottom: 6px;
  font-size: 16px; /* حجم النص */
}

.code-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.code-value {
  color: #00ff88;
  font-size: 16px; /* حجم أصغر للأكواد الطويلة */
  font-weight: bold;
  word-break: break-all;
}

/* زر النسخ */
.copy-btn {
  background: rgba(0,0,0,0.25);
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.copy-btn:hover {
  background: rgba(0,0,0,0.4);
}

/* رسالة النسخ */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #00c853;
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  display: none;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <div class="icon" id="menuBtn">&#9776;</div>
  <h1>GCode</h1>
  <div class="icon" id="searchBtn">&#128269;</div>
  <input type="text" id="searchBox" placeholder="Recherche..." class="search-box">
</header>

<div class="sidebar" id="sidebar">
  <h2 id="gamesToggle">Games ></h2>
  <ul id="gamesList">
    <li data-game="blox">Blox Fruit</li>
    <li data-game="fortnite">Fortnite</li>
    <li data-game="brawl">Brawl Stars</li>
  </ul>
</div>

<div class="content" id="content">
  مرحبا بك في GCode
</div>

<div class="toast" id="toast">Successfully copied ✅</div>

<script>
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const gamesToggle = document.getElementById('gamesToggle');
const gamesList = document.getElementById('gamesList');
const searchBtn = document.getElementById('searchBtn');
const searchBox = document.getElementById('searchBox');
const content = document.getElementById('content');
const toast = document.getElementById('toast');

let searchTimeout;

menuBtn.onclick = () => sidebar.classList.toggle('active');

gamesToggle.onclick = () => {
  gamesList.classList.toggle('show');
  gamesToggle.textContent =
    gamesList.classList.contains('show') ? 'Games ▼' : 'Games >';
};

searchBtn.onclick = () => {
  searchBox.classList.toggle('show');
  clearTimeout(searchTimeout);
  if (searchBox.classList.contains('show')) {
    searchTimeout = setTimeout(() => { searchBox.classList.remove('show'); }, 10000);
  }
};
searchBox.addEventListener('input', () => { clearTimeout(searchTimeout); });

function copyCode(code) {
  navigator.clipboard.writeText(code);
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 1500);
}

document.querySelectorAll('#gamesList li').forEach(item => {
  item.onclick = () => {
    const game = item.dataset.game;

    if (game === 'blox') {

      const codes = [
        {label:"1$ Money - Code :", code:"fudd10"},
        {label:"2$ Money - Code :", code:"fudd10_V2"},
        {label:"0$ Money - Code :", code:"Chandler"},
        {label:"Beg News Title - Code :", code:"BIGNEWS"},
        {label:"Reset Stat - Code :", code:"KITT_RESET"},
        {label:"Reset Stat - Code :", code:"Sub2UncleKizaru"},
        {label:"Reset Stat - Code :", code:"SUB2GAMERROBOT_RESET1"},
        {label:"2x Exp 20min - Code :", code:"Sub2Fer999"},
        {label:"2x Exp 20min - Code :", code:"Enyu_is_Pro"},
        {label:"2x Exp 20min - Code :", code:"JCWK"},
        {label:"2x Exp 20min - Code :", code:"StarcodeHEO"},
        {label:"2x Exp 20min - Code :", code:"MagicBUS"},
        {label:"2x Exp 20min - Code :", code:"KittGaming"},
        {label:"2x Exp 20min - Code :", code:"Sub2CaptainMaui"},
        {label:"2x Exp 20min - Code :", code:"Sub2OfficialNoobie"},
        {label:"2x Exp 20min - Code :", code:"TheGreatAce"},
        {label:"2x Exp 20min - Code :", code:"Sub2NoobMaster123"},
        {label:"2x Exp 20min - Code :", code:"Sub2Daigrock"},
        {label:"2x Exp 20min - Code :", code:"Axiore"},
        {label:"2x Exp 20min - Code :", code:"StrawHatMaine"},
        {label:"2x Exp 20min - Code :", code:"TantaiGaming"},
        {label:"2x Exp 20min - Code :", code:"Bluxxy"},
        {label:"2x Exp 30min - Code :", code:"SUB2GAMERROBOT_EXP1"}
      ];

      let cards = '';
      codes.forEach(item => {
        cards += `
          <div class="code-card">
            <div class="code-label">${item.label}</div>
            <div class="code-row">
              <div class="code-value">${item.code}</div>
              <button class="copy-btn" onclick="copyCode('${item.code}')">📋</button>
            </div>
          </div>
        `;
      });

      content.innerHTML = `<div class="game-title">Blox Fruit</div>${cards}`;
    }

    else if (game === 'fortnite') { content.innerHTML = `<div class="game-title">Fortnite</div>`; }
    else if (game === 'brawl') { content.innerHTML = `<div class="game-title">Brawl Stars</div>`; }

    sidebar.classList.remove('active');
  };
});
</script>

</body>
</html>
