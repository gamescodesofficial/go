body { margin:0; font-family:Arial,sans-serif; min-height:100vh; background:linear-gradient(135deg,#2c006d,#9b1acc,#e02fb5); display:flex; flex-direction:column; overflow-x:hidden; }
header { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background-color:rgba(255,255,255,0.15); backdrop-filter:blur(10px); position:relative; }
header h1 { color:white; font-size:24px; margin:0; font-weight:bold; }
.icon { width:28px; height:28px; border-radius:4px; background-color:rgba(255,255,255,0.6); display:flex; justify-content:center; align-items:center; cursor:pointer; font-size:18px; color:#333; }
.search-box { position:absolute; top:70px; right:20px; width:220px; padding:10px; border-radius:8px; border:none; outline:none; display:none; z-index:20; }
.search-box.show { display:block; }
.sidebar { position:fixed; top:60px; left:-100%; width:250px; height:calc(100% - 60px); background-color:rgba(0,0,0,0.6); backdrop-filter:blur(10px); color:white; padding:20px; transition:left 0.3s ease; }
.sidebar.active { left:0; }
.sidebar h2 { cursor:pointer; user-select:none; }
.sidebar ul { list-style:none; padding-left:15px; margin:0; max-height:0; overflow:hidden; transition:max-height 0.3s ease; }
.sidebar ul.show { max-height:500px; }
.sidebar ul li { margin:10px 0; cursor:pointer; padding:6px; border-radius:6px; }
.sidebar ul li:hover { background:rgba(255,255,255,0.15); }
.content { flex:1; color:white; padding:20px; }
.game-title { font-size:28px; font-weight:bold; margin-bottom:20px; }
.code-card { background:linear-gradient(90deg,#ff4ecd,#ff7a7a); padding:15px; border-radius:12px; margin-bottom:12px; }
.code-label { color:white; font-weight:bold; margin-bottom:6px; font-size:16px; }
.code-row { display:flex; justify-content:space-between; align-items:center; }
.code-value { color:#00ff88; font-size:16px; font-weight:bold; word-break:break-all; }
.copy-btn { background:rgba(0,0,0,0.25); border:none; color:white; padding:6px 10px; border-radius:6px; cursor:pointer; font-size:14px; }
.copy-btn:hover { background:rgba(0,0,0,0.4); }
.ad-card { background:rgba(255,255,255,0.2); color:white; text-align:center; padding:12px; border-radius:12px; margin-bottom:12px; font-weight:bold; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#00c853; color:white; padding:10px 18px; border-radius:8px; display:none; font-weight:bold; }
</style>
